<div>
    <ul id="chat-list"></ul>
    <div>
        <input type="text" id="chat-content" class="mb-3">
        <button id="chat-send" class="btn">Send</button>
    </div>
</div>

<script>
    function initWebSocket() {
        // Create WebSocket connection.
        const socket = new WebSocket("ws://localhost:8080/jw/web/socket/plugin/id.fajaralfa.joget.websocket.Example");

        // Connection opened
        socket.addEventListener("open", (event) => {
            console.log('socket opened.');
            socket.send("Hello Server!");
        });

        onPageLeave(getPageKey(), () => {
            console.log("socket closed.");
            socket.close();
        });

        return socket;
    }

    /**
     * @param {WebSocket} socket
     */
    function listenSendMessage(socket) {
        // send message
        console.log('initializing listenSendMessage');
        $('#chat-send').click(function () {
            const content = $('#chat-content').val();
            const payload = JSON.stringify({type: 'message', content: content});
            console.log('sending message: ', payload);
            socket.send(payload);
            $('#chat-content').val('');
        });
    }

    function listenUpdateChat(socket) {
        // update chat list
        console.log('initializing listenUpdateChat');
        socket.addEventListener("message", event => {
            console.log('text json: ', event.data);
            const data = JSON.parse(event.data);
            console.log('data: ', data);
            if (data.type === 'message') {
                const message = data.content;
                $('#chat-list').append($('<li>').text(message));
            }
        });
    }

    onPageReady(getPageKey(), () => {
        var socket = initWebSocket();
        listenSendMessage(socket);
        listenUpdateChat(socket);
    });
</script>
